[package]
name = "crossdev-stages"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "crossdev-stages"
path = "src/main.rs"

[dependencies]
hakoniwa      = { git = "https://github.com/souk4711/hakoniwa" }
gentoo-stages = { git = "https://github.com/lu-zero/gentoo-stages" }
clap         = { version = "4", features = ["derive"] }
tokio        = { version = "1", features = ["full"] }
anyhow       = "1"
thiserror    = "2"
log          = "0.4"
env_logger   = "0.11"
serde        = { version = "1", features = ["derive"] }
chrono       = "0.4"
num_cpus     = "1"
