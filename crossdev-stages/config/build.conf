# Host-side build policy. Optional — defaults in Rust apply if file is missing.
#
# GCC_SLOT: sys-devel/gcc:N slot used for the host and cross toolchain.
#   Changing this affects the emerged gcc version + gcc-config selection +
#   package.accept_keywords/gcc unmask pattern (all derived from this value).
GCC_SLOT="16"

# FEATURES_BASE: baseline portage FEATURES applied via make.conf. Extended
# with "getbinpkg" automatically when --binhost is set.
FEATURES_BASE="parallel-install -merge-wait"

# MAKEOPTS_JOBS / MAKEOPTS_LOAD: parallelism knobs. Integers. Leave empty
# (or 0) for auto:
#   MAKEOPTS_JOBS  → nproc          (was nproc/2+1; changed to full saturation)
#   MAKEOPTS_LOAD  → nproc * 3 / 2  (a bit of headroom for I/O-bound tasks)
# Same value is applied to MAKEOPTS -jN and EMERGE_DEFAULT_OPTS --jobs=N.
MAKEOPTS_JOBS=""
MAKEOPTS_LOAD=""
