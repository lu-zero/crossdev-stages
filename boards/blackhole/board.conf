BOARD_NAME="blackhole"
BOARD_ARCH="riscv64"
BOARD_CFLAGS="-O3 -march=rv64gcv_zvl512b -pipe"
CROSS_COMPILE="riscv64-unknown-linux-gnu-"
KERNEL_ARCH="riscv"

# Tenstorrent Blackhole P100/P150 PCIe card
# SiFive X280 cores (4x L2CPU, 4 cores each = 16 cores)
# Boot via PCIe BAR - no SD card, no u-boot
OPENSBI_REPO="https://github.com/tenstorrent/opensbi.git"
OPENSBI_TAG="tt-blackhole"
OPENSBI_PLATFORM="generic"
KERNEL_REPO="https://github.com/tenstorrent/linux.git"
KERNEL_TAG="tt-blackhole"
KERNEL_DEFCONFIG="blackhole_defconfig"

# No firmware repo, no u-boot
# Boot: host tool loads opensbi+kernel+dtb via PCIe BAR into DRAM

BOOT_HOSTNAME="gentoo-blackhole"
BOOT_CONSOLE="ttyS0,115200"
BOOT_SERIAL_TTY="ttyS0"
BOOT_SERIAL_BAUD="115200"

# No SD card - rootfs.ext4 loaded via PCIe BAR
BUILD_STEPS=(deps checkout bootloader kernel assemble pack)

BOOT_SERVICES=("sshd:default")

IMAGE_NAME="gentoo-linux-blackhole-rootfs.ext4"
