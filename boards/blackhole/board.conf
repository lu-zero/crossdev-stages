BOARD_NAME="blackhole"
BOARD_ARCH="riscv64"
BOARD_CFLAGS="-O3 -march=rv64gcv_zvl512b -pipe"
SYSROOT="rv64gcv_zvl512b"
CROSS_COMPILE="riscv64-unknown-linux-gnu-"
KERNEL_ARCH="riscv"

# Tenstorrent Blackhole P100/P150 PCIe card
# SiFive X280 cores (4x L2CPU, 4 cores each = 16 cores)
# Boot via PCIe BAR - no SD card, no u-boot
OPENSBI_REPO="https://github.com/tenstorrent/opensbi.git"
OPENSBI_TAG="tt-blackhole"
OPENSBI_PLATFORM="generic"
OPENSBI_FW_TYPE="jump"
# Tenstorrent host loader writes opensbi/kernel/dtb at fixed offsets in DRAM.
# These flags must match its layout (see tenstorrent/opensbi CI build.yml):
#   opensbi @ 0x400030000000
#   kernel  @ +0x200000  -> FW_JUMP_OFFSET
#   dtb     @ +0x100000  -> FW_JUMP_FDT_OFFSET
# FW_PIC=y is required so the firmware works regardless of load address.
# Without these, opensbi can't find the kernel/dtb and generic_early_init
# fails before virtual_uart_init runs (host tool sees no virtual UART).
OPENSBI_MAKE_FLAGS="FW_PIC=y FW_JUMP_OFFSET=0x200000 FW_JUMP_FDT_OFFSET=0x100000"
KERNEL_REPO="https://github.com/tenstorrent/linux.git"
KERNEL_TAG="tt-blackhole"
KERNEL_DEFCONFIG="blackhole_defconfig"

# No firmware repo, no u-boot
# Boot: host tool loads opensbi+kernel+dtb via PCIe BAR into DRAM

BOOT_HOSTNAME="gentoo-blackhole"
# OpenSBI exposes a virtio_console at hvc0; there is no real serial.
BOOT_CONSOLE="hvc0,115200"
BOOT_SERIAL_TTY="hvc0"
BOOT_SERIAL_BAUD="115200"

# No SD card - rootfs.ext4 loaded via PCIe BAR
BUILD_STEPS=(deps checkout bootloader kernel assemble pack)

BOOT_SERVICES=("sshd:default" "dhcpcd:default")

IMAGE_NAME="gentoo-linux-blackhole-rootfs.ext4"
