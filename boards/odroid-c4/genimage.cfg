config {
    outputpath = .
    inputpath = .
    rootpath = gen
    tmppath = tmp
}

image rootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "rootfs"
        extraargs = "-i 4k"
    }

    size = 3G
    mountpoint = "/root"
}

image bootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "bootfs"
    }

    size = 128M
    mountpoint = "/boot"
}

/* Amlogic SM1 SD boot layout: same as GXBB -- u-boot.bin.sd.bin goes at
 * offset 0 with a hole in bytes 440-512 so genimage can write its MBR
 * partition table. First partition starts at 4 MiB to clear the bootloader.
 */
image gentoo-linux-odroid-c4_dev-sdcard.img {
    hdimage {
        partition-table-type = mbr
    }

    partition bootloader {
        image = "u-boot-sd/u-boot.bin.sd.bin"
        offset = "0"
        holes = "(440; 512)"
        in-partition-table = "false"
    }

    partition bootfs {
        image = "bootfs.ext4"
        offset = "4M"
        size = "128M"
        partition-type = 0x83
        bootable = "true"
        in-partition-table = "true"
    }

    partition rootfs {
        image = "rootfs.ext4"
        offset = "132M"
        size = ""
        partition-type = 0x83
        in-partition-table = "true"
    }
}
