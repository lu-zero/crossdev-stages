TESTING="true"

BOARD_NAME="k1-upstream"
BOARD_ARCH="riscv64"
BOARD_CFLAGS="-O3 -march=rv64gcv_zvl256b -pipe"
SYSROOT="rv64gcv_zvl256b"
CROSS_COMPILE="riscv64-unknown-linux-gnu-"
KERNEL_ARCH="riscv"

# Upstream sources (SpacemiT linux-k3, DENX u-boot, RISC-V opensbi)
OPENSBI_REPO="https://github.com/riscv-software-src/opensbi"
OPENSBI_PLATFORM="generic"
U_BOOT_REPO="https://source.denx.de/u-boot/u-boot.git"
U_BOOT_DEFCONFIG="bananapi-f3_defconfig"
KERNEL_REPO="https://github.com/spacemit-com/linux-k3"
KERNEL_TAG="k3/integration"
KERNEL_DEFCONFIG="spacemit_defconfig"

BOARD_DTB_GLOB="arch/riscv/boot/dts/spacemit/k1-bananapi-f3*.dtb"
DRACUT_MODULES="busybox"

# Boot environment (same as vendor k1 for now)
BOOT_ROOT_DEV="/dev/mmcblk0p6"
BOOT_CONSOLE="ttyS0,115200"
BOOT_LOGLEVEL="8"
BOOT_KERNEL_NAME="Image.gz.itb"
BOOT_RAMDISK_NAME="initramfs.img"

BUILD_STEPS=(deps checkout bootloader kernel assemble pack)

BOOT_SERVICES=("sshd:default" "metalog:default" "ntp-client:default")
BOOT_HOSTNAME="gentoo"
BOOT_SERIAL_TTY="console"
BOOT_SERIAL_BAUD="115200"
