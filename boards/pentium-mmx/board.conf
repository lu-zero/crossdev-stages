BOARD_NAME="pentium-mmx"
BOARD_ARCH="i586"
BOARD_CFLAGS="-march=pentium-mmx -O2 -pipe"
SYSROOT="pentium-mmx"
CROSS_COMPILE="i586-pc-linux-gnu-"
KERNEL_ARCH="x86"

# Intel Pentium MMX (P55C, 1997)
# i586 class, MMX SIMD, no SSE
# BIOS boot - no u-boot, no opensbi

KERNEL_REPO="https://github.com/torvalds/linux.git"
KERNEL_TAG="v6.18"
KERNEL_DEFCONFIG="i386_defconfig"

BOOT_HOSTNAME="gentoo-pentium-mmx"
BOOT_CONSOLE="ttyS0,115200"
BOOT_SERIAL_TTY="ttyS0"
BOOT_SERIAL_BAUD="115200"
BOOT_ROOT_DEV="/dev/sda1"
BOOT_KERNEL_NAME="bzImage"

BUILD_STEPS=(deps checkout kernel assemble pack)

BOOT_SERVICES=("sshd:default" "dhcpcd:default")

TESTING="true"
