config {
    outputpath = .
    inputpath = .
    rootpath = gen
    tmppath = tmp
}

image rootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "rootfs"
    }

    size = 4G
    mountpoint = "/root"
}

image bootfs.vfat {
    vfat {
        extraargs = "-F 32"
        label = "bootfs"
    }

    size = 200M
    mountpoint = "/boot"
}

image gentoo-linux-pentium-mmx_dev-sdcard.img {
    hdimage {
        partition-table-type = "mbr"
    }

    partition bootfs {
        image = "bootfs.vfat"
        offset = 1M
        partition-type = 0x0c
        bootable = true
    }

    partition rootfs {
        image = "rootfs.ext4"
        offset = 201M
        partition-type = 0x83
    }

    # Install GRUB i386-pc MBR bootstrap code and embed core.img in the gap.
    # grub-boot.img and grub-core.img are staged by the bootloader build step.
    # boot.img is patched at byte 92 (LBA of core.img = 1) before writing.
    # core.img starts at LBA 1 (byte 512) and fits within the 1 MiB gap.
    exec-post = 'cp /build/grub-boot.img /build/boot-patched.img && \
                 printf "\001\000\000\000\000\000\000\000" | \
                     dd of=/build/boot-patched.img bs=1 seek=92 count=8 conv=notrunc 2>/dev/null && \
                 dd if=/build/boot-patched.img of=$IMAGEOUTFILE bs=440 count=1 conv=notrunc 2>/dev/null && \
                 dd if=/build/grub-core.img of=$IMAGEOUTFILE bs=512 seek=1 conv=notrunc 2>/dev/null'
}
