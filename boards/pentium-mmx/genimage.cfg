config {
    outputpath = .
    inputpath = .
    rootpath = gen
    tmppath = tmp
}

image rootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "rootfs"
    }

    size = 4G
    mountpoint = "/root"
}

image bootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "bootfs"
    }

    size = 200M
    mountpoint = "/boot"
}

image gentoo-linux-pentium-mmx_dev-sdcard.img {
    hdimage {
        partition-table-type = "mbr"
    }

    partition bootfs {
        image = "bootfs.ext4"
        offset = 1M
        partition-type = 0x83
        bootable = true
    }

    partition rootfs {
        image = "rootfs.ext4"
        offset = 201M
        partition-type = 0x83
    }
}
