config {
    outputpath = .
    inputpath = .
    rootpath = gen
    tmppath = tmp
}

image rootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "rootfs"
        extraargs = "-i 4k"
    }

    size = 5G
    mountpoint = "/root"
}

image bootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "bootfs"
    }

    size = 256M

    mountpoint = "/boot"
}

image gentoo-linux-k3_dev-sdcard.img {
    hdimage {
        partition-table-type = gpt
    }

    partition env {
        image = "u-boot/env.bin"
        offset = "640K"
        size = "64K"
        in-partition-table = "false"
    }

    partition bootinfo {
        image = "factory/bootinfo_block.bin"
        offset = "1M"
        size = "128K"
        in-partition-table = "true"
    }

    partition fsbl {
        image = "factory/FSBL.bin"
        offset = "1536K"
        size = "512K"
        in-partition-table = "true"
    }

    partition esos {
        image = "esos.itb"
        offset = "4M"
        size = "3M"
        in-partition-table = "true"
    }

    partition opensbi {
        image = "opensbi/build/platform/generic/firmware/fw_dynamic.itb"
        offset = "7M"
        size = "1M"
        in-partition-table = "true"
    }

    partition uboot {
        image = "u-boot/u-boot.itb"
        offset = "8M"
        size = "4M"
        in-partition-table = "true"
    }

    partition bootfs {
        image = "bootfs.ext4"
        offset = "12M"
        size = "256M"
        in-partition-table = "true"
    }

    partition rootfs {
        image = "rootfs.ext4"
        offset = "268M"
        size = ""
        in-partition-table = "true"
        partition-type-uuid = "root-riscv64"
    }
}
