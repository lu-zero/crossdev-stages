config {
    outputpath = .
    inputpath = .
    rootpath = gen
    tmppath = tmp
}

image rootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "rootfs"
        extraargs = "-i 4k"
    }

    size = 5G
    mountpoint = "/root"
}

image bootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "bootfs"
        # K3 storage is 4K-LBA UFS. mke2fs's `small` template picks 1K blocks
        # for <512M filesystems, but u-boot's ext4 driver computes
        # `log2_fs_blocksize = log2(fs_blksz) - log2(dev_sector_size)` and
        # left-shifts blknr by that — negative shift is UB and produces
        # `blknr << 62` (RISC-V masks shamt to 6 bits), giving sector 2^63
        # and "fs_devread outside partition 9223372036854775808".
        extraargs = "-b 4096"
    }

    size = 256M

    mountpoint = "/boot"
}

image esp.vfat {
    vfat {
        label = "ESP"
        # K3 UFS is 4K-LBA. mkfs.vfat default is 512-byte sectors.
        extraargs = "-S 4096 -F 16"
    }
    size = 256M
}

image gentoo-linux-k3_dev-sdcard.img {
    hdimage {
        partition-table-type = gpt
    }

    partition env {
        image = "u-boot/env.bin"
        offset = "640K"
        size = "64K"
        in-partition-table = "false"
    }

    # env/bootinfo/fsbl/esos/opensbi/uboot are raw blobs at fixed offsets
    # the boot ROM + early stages address directly — they MUST NOT appear in
    # the GPT (matches Bianbu/Ubuntu vendor layout).
    partition bootinfo {
        image = "factory/bootinfo_block.bin"
        offset = "1M"
        size = "128K"
        in-partition-table = "false"
    }

    partition fsbl {
        image = "factory/FSBL.bin"
        offset = "1536K"
        size = "512K"
        in-partition-table = "false"
    }

    partition esos {
        image = "esos.itb"
        offset = "4M"
        size = "3M"
        in-partition-table = "false"
    }

    partition opensbi {
        image = "opensbi/build/platform/generic/firmware/fw_dynamic.itb"
        offset = "7M"
        size = "1M"
        in-partition-table = "false"
    }

    partition uboot {
        image = "u-boot/u-boot.itb"
        offset = "8M"
        size = "4M"
        in-partition-table = "false"
    }

    partition ESP {
        image = "esp.vfat"
        offset = "12M"
        size = "256M"
        in-partition-table = "true"
    }

    partition bootfs {
        image = "bootfs.ext4"
        offset = "268M"
        size = "256M"
        in-partition-table = "true"
    }

    partition rootfs {
        image = "rootfs.ext4"
        offset = "524M"
        size = ""
        in-partition-table = "true"
        partition-type-uuid = "root-riscv64"
    }
}
