BOARD_NAME="k3"
BOARD_ARCH="riscv64"
BOARD_CFLAGS="-O3 -march=rv64gc -pipe"
BOARD_GCC_VERSION="15.2"
CROSS_COMPILE="riscv64-unknown-linux-gnu-"
KERNEL_ARCH="riscv"

TAG="k3-br-v1.0.y"
OPENSBI_TAG="k3-br-v1.0.y"
OPENSBI_REPO="https://github.com/spacemit-com/opensbi"
OPENSBI_PLATFORM="generic"
OPENSBI_MAKE_FLAGS="LLVM=1 PLATFORM_DEFCONFIG=k3_defconfig"
U_BOOT_REPO="https://github.com/spacemit-com/uboot-2022.10.git"
U_BOOT_DEFCONFIG="k3_defconfig"
FIRMWARE_REPO="https://github.com/spacemit-com/buildroot-ext.git"
KERNEL_REPO="https://github.com/spacemit-com/linux-6.18.git"
KERNEL_DEFCONFIG="k3_bianbu_defconfig"

BOARD_DTB_GLOB="arch/riscv/boot/dts/spacemit/k3_*.dtb"
BOARD_FIRMWARE_OVERLAY="board/spacemit/k3/target_overlay/lib/firmware"
HOST_FIRMWARE_PATHS=("/lib/firmware/rtw89")
DRACUT_MODULES="busybox"

# Boot environment
BOOT_ROOT_DEV="/dev/mmcblk0p7"
BOOT_CONSOLE="ttyS0,115200"
BOOT_LOGLEVEL="8"
BOOT_KERNEL_NAME="Image"
BOOT_RAMDISK_NAME="initramfs.img"

# Services to enable (service:runlevel pairs)
BUILD_STEPS=(deps checkout bootloader kernel assemble pack)

BOOT_SERVICES=("sshd:default" "metalog:default" "ntp-client:default")
BOOT_HOSTNAME="gentoo"
BOOT_SERIAL_TTY="console"
BOOT_SERIAL_BAUD="115200"
