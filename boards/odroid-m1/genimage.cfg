config {
    outputpath = .
    inputpath = .
    rootpath = gen
    tmppath = tmp
}

image rootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "rootfs"
        extraargs = "-i 4k"
    }

    size = 5G
    mountpoint = "/root"
}

image bootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "bootfs"
    }

    size = 256M
    mountpoint = "/boot"
}

image gentoo-linux-odroid-m1_dev-sdcard.img {
    hdimage {
        partition-table-type = gpt
    }

    /* idbloader.img at sector 64 (32KB) */
    partition idbloader {
        image = "u-boot/idbloader.img"
        offset = "32K"
        size = "4M"
        in-partition-table = "false"
    }

    /* u-boot.itb at sector 16384 (8MB) */
    partition uboot {
        image = "u-boot/u-boot.itb"
        offset = "8M"
        size = "4M"
        in-partition-table = "false"
    }

    partition bootfs {
        image = "bootfs.ext4"
        offset = "16M"
        size = "256M"
        partition-type-uuid = "C12A7328-F81F-11D2-BA4B-00A0C93EC93B"
        in-partition-table = "true"
    }

    partition rootfs {
        image = "rootfs.ext4"
        offset = "272M"
        size = ""
        partition-type-uuid = "B921B045-1DF0-41C3-AF44-4C6F280D3FAE"
        in-partition-table = "true"
    }
}
