config {
    outputpath = .
    inputpath = .
    rootpath = gen
    tmppath = tmp
}

image rootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "rootfs"
        extraargs = "-i 4k"
    }

    size = 5G
    mountpoint = "/root"
}

image bootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "bootfs"
    }

    size = 500M

    mountpoint = "/boot"
}

image gentoo-linux-k230_dev-sdcard.img {
    hdimage {
        partition-table-type = gpt
        align = 1M
    }

    partition uboot_spl_1 {
            image = "u-boot/fn_u-boot-spl.bin"
            offset = "1024K"
            size = "512K"
            holes = {}
            in-partition-table = "false"
    }

    partition uboot_spl_2 {
            image = "u-boot/fn_u-boot-spl.bin"
            offset = "1536K"
            size = "512K"
            holes = {}
            in-partition-table = "false"
    }

    partition uboot {
            image = "u-boot/ug_u-boot.bin"
            offset = "2M"
            size = "1M"
            holes = {}
            in-partition-table = "false"
    }

    partition bootfs {
            image = "bootfs.ext4"
            offset = "3M"
            size = "500M"
            holes = {}
            in-partition-table = "true"
    }

    partition rootfs {
            image = "rootfs.ext4"
            offset = "503M"
            size = ""
            holes = {}
            in-partition-table = "true"
            partition-type-uuid = "root-riscv64"
    }
}
