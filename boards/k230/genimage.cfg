config {
    outputpath = .
    inputpath = .
    rootpath = gen
    tmppath = tmp
}

image rootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "rootfs"
    }

    size = 2G
    mountpoint = "/root"
}

image bootfs.fat32 {
    vfat {
        label = "boot"
    }

    size = 128M
    mountpoint = "/boot"
}

image gentoo-linux-k230_dev-sdcard.img {
    hdimage {
        partition-table-type = gpt
    }

    partition spl {
        image = "u-boot/fn_u-boot-spl.bin"
        offset = "128K"
        size = "256K"
        in-partition-table = "true"
    }

    partition uboot {
        image = "u-boot/ug_u-boot.bin"
        offset = "384K"
        size = "2M"
        in-partition-table = "true"
    }

    partition bootfs {
        image = "bootfs.fat32"
        offset = "4M"
        size = "128M"
        in-partition-table = "true"
    }

    partition rootfs {
        image = "rootfs.ext4"
        offset = "132M"
        size = ""
        in-partition-table = "true"
        partition-type-uuid = "root-riscv64"
    }
}
