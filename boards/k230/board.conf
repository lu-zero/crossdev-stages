BOARD_NAME="k230"
BOARD_ARCH="riscv64"
BOARD_CFLAGS="-O3 -march=rv64gcv_zvl128b -pipe"
CROSS_COMPILE="riscv64-unknown-linux-gnu-"
KERNEL_ARCH="riscv"

# K230: opensbi embeds kernel, so linux must build before bootloader
OPENSBI_REPO="https://github.com/k230-linux/opensbi.git"
OPENSBI_TAG="k230"
OPENSBI_PLATFORM="generic"
U_BOOT_REPO="https://github.com/k230-linux/k230-vendor-uboot.git"
U_BOOT_TAG="k230"
U_BOOT_DEFCONFIG="k230_canmv_defconfig"
KERNEL_REPO="https://github.com/k230-linux/k230-linux-kernel.git"
KERNEL_TAG="k230-v6.12.y"
KERNEL_DEFCONFIG="k230_evb_linux_enable_vector_defconfig"

BOARD_DTB_GLOB="arch/riscv/boot/dts/canaan/k230_canmv*.dtb"
DRACUT_MODULES="busybox"

# Boot environment
BOOT_ROOT_DEV="/dev/mmcblk1p2"
BOOT_CONSOLE="ttyS0,115200n8"
BOOT_HOSTNAME="gentoo"
BOOT_SERIAL_TTY="ttyS0"
BOOT_SERIAL_BAUD="115200"

BOOT_SERVICES=("sshd:default")
