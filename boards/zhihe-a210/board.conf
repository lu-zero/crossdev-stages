# Zhihe A210 board.  Boot env baked into uboot_env.img by post-assemble.sh:
#   bootargs 'console=ttyS4,115200 root=PARTLABEL=rootfs \
#     rw rootwait earlycon clk_ignore_unused loglevel=4'
#   bootcmd  'ext4load mmc 0:3 ${kernel_addr} Image && \
#             ext4load mmc 0:3 ${dtb_addr} a210-dev.dtb && \
#             booti ${kernel_addr} - ${dtb_addr}'
# PARTLABEL-rooted, no initrd (kernel statically links eMMC/eth/pinctrl/PMIC).
# The same bootargs is materialised into extlinux.conf by post-assemble.sh.

BOARD_NAME="zhihe-a210"
BOARD_ARCH="riscv64"
# Zhihe A210 per arch/riscv/boot/dts/zhihe/a210-soc-core.dtsi `riscv,isa-extensions`:
#   "i","m","a","f","d","c","v","zicntr","zicsr","zifencei","zihpm",
#   "zba","zbb","zbc","zbs","svpbmt","sscofpmf"
# RVV 1.0 with VLEN=128 (vendor spec).  NOT RVA23, and NOT RVA22U64
# either: the profile mandates zicboz/zicbom/zic64b/zfhmin which are
# absent from the DTS list above — gcc emits cbo.zero for memset when
# zicboz+zic64b are in -march, and the kernel only enables CBZE for
# userland when the DT advertises zicboz, so profile-built binaries
# SIGILL.  Spell the extensions out explicitly (README `ISA / GCC`).
BOARD_CFLAGS="-O3 -march=rv64gcv_zvl128b_zba_zbb_zbc_zbs -pipe"
SYSROOT="rv64gcv_zvl128b_zba_zbb_zbc_zbs"
CROSS_COMPILE="riscv64-unknown-linux-gnu-"
KERNEL_ARCH="riscv"

# Toolchain pins — exact versions, not slot-only.
# "16" alone selects gcc:16 slot which picks newest = 16.2.9999 live ebuild
# (clones full gcc.git, days to build).  "16.1.0" pins to released 16.1.0
# via `emerge =sys-devel/gcc-16.1.0*`, same pattern as boards/k3.
BOARD_GCC_VERSION="16.1.0"

# Vendor source mirrors — OSU Open Source Lab GitLab (Zhihe-blessed).
# Pin to v2.9.0 tags so vendor `develop` branch movement does not break us.

# OpenSBI: vendor fork, fw_dynamic handoff (NOT FW_PAYLOAD like k230).
# u-boot SPL loads fw_dynamic.bin to 0x80000000 via CONFIG_SPL_OPENSBI.
# OPENSBI v2.9.0 = ebc44c77997c42485931e6e857a4f5a43aca1b14 (opensbi 2.8.0 base)
OPENSBI_REPO="https://git.osuosl.org/osuosl/zhihe-a210-opensbi.git"
OPENSBI_TAG="v2.9.0"
OPENSBI_PLATFORM="generic"
OPENSBI_FW_TYPE="dynamic"
OPENSBI_MAKE_FLAGS="PLATFORM_RISCV_ISA=rv64imafdc_zicsr_zifencei PLATFORM_RISCV_ABI=lp64d"

# U-Boot 2024.10 base; SPL output is `zhihe-rvbl.bin` (CONFIG_BUILD_TARGET).
# SPL TEXT_BASE 0x70000800, u-boot proper at 0x90000000.
# v2.9.0 = bb2f09226973ad8d5c11f3cf0745721ba31a8e2a
U_BOOT_REPO="https://git.osuosl.org/osuosl/zhihe-a210-u-boot.git"
U_BOOT_TAG="v2.9.0"
U_BOOT_DEFCONFIG="a210_evb_defconfig"

# Kernel: OSL's a210-mainline (v7.1 base + A210 enablement) is the
# recommended default per a210-linux/docs/STATUS-2026-06-17.md.  T7
# first-board validation (PASSED 2026-06-15) actually ran on
# osl/a210-6.6.x-lts (6.6.141-osl+) — switch to that branch as a
# conservative fallback if mainline regresses.
# osl/a210-mainline head = c27d0dfab32d2b5b46b0c118a4c393b63d479646
KERNEL_REPO="https://git.osuosl.org/osuosl/zhihe-a210-kernel.git"
KERNEL_TAG="osl/a210-mainline"
KERNEL_DEFCONFIG="a210_evb_defconfig"
# OSL hardware uses the DEV variant DTS (PROVISION_RUNBOOK.md).
# Vendor also ships a210-evb.dtb for the bare EVB board.
BOARD_DTB_GLOB="arch/riscv/boot/dts/zhihe/a210-dev.dtb"

# Boot environment.
# A210 console is ttyS4 (UART4 in DTS), 115200 8N1.
# OSL flatten layout: 4 partitions (factory, uboot_env, boot, rootfs).
# Root by PARTLABEL=rootfs, not /dev/mmcblk0pN (device numbering) and
# not PARTUUID (genimage regenerates GPT UUIDs every build); the GPT
# partition names in genimage.cfg are stable.
# Vendor `booti` accepts unsigned kernel (KERNEL.md, 2026-05-28 vendor reply)
# — no FIT-signed kernel path is needed in normal boot.
BOOT_ROOT_DEV="PARTLABEL=rootfs"
BOOT_CONSOLE="ttyS4,115200n8"
BOOT_KERNEL_NAME="Image"
BOOT_DTB_NAME="a210-dev.dtb"
BOOT_HOSTNAME="gentoo"
BOOT_SERIAL_TTY="ttyS4"
BOOT_SERIAL_BAUD="115200"

# Build order: u-boot SPL embeds opensbi via CONFIG_SPL_OPENSBI,
# so opensbi must be built before u-boot.  Standard `bootloader` step
# builds opensbi then u-boot in sequence — same as k3.
BUILD_STEPS=(deps checkout bootloader kernel assemble pack)

# RVV 1.0 vector miscompile workaround — same pattern as k230.
# libgcrypt's vector CRYPT routines miscompile with -march=rv64gcv on
# this toolchain; fall back to scalar build for that package.
# Per gentoo bug #975669: openssh -O3 + autovec miscompiles ed25519 sigverify.
# -O2 (any march) passes; we keep V for everything else, just drop to -O2 here.
WORKAROUND_PKGS=("dev-libs/libgcrypt" "net-misc/openssh")
WORKAROUND_CFLAGS=("-O3 -march=rv64gc -pipe" "-O2 -march=rv64gcv_zvl128b_zba_zbb_zbc_zbs -pipe")

BOOT_SERVICES=("dhcpcd:boot" "sshd:default" "metalog:default" "ntp-client:default" "ntpd:default")

# A210 boots from eMMC (not sdcard), genimage.cfg names the image accordingly.
# Override the default `<board>_dev-sdcard.img` name so pack's mv finds it.
IMAGE_NAME="gentoo-linux-zhihe-a210_dev-emmc.img"
