config {
    outputpath = .
    inputpath = .
    rootpath = gen
    tmppath = tmp
}

image rootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "rootfs"
        extraargs = "-i 4k"
    }

    size = 2494M
    mountpoint = "/root"
}

image bootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "bootfs"
    }

    size = 256M
    mountpoint = "/boot"
}

# Zhihe A210 eMMC GPT — single-slot first cut, adapted from vendor
# `board/zhihe/common/images/gpt/gpt_emmc.txt`.
#
# Vendor layout is A/B-redundant (boot_a/boot_b, system_a/system_b,
# app_a/app_b).  We keep vendor partition naming + sizes for the A
# slot so vendor fastboot tooling still resolves `flash boot`,
# `flash system`, etc. against the slot vendor scripts target.
# Boot_b/system_b/app_b are reserved (sized correctly) but left
# empty in this first cut.  Switch to true A/B later by populating
# the _b slots and wiring an `slot_a_b` u-boot env var.
#
# Per vendor layout: factory(32K), uboot_env(32K) live before the
# first user-visible partition.  factory holds board-specific
# OTP/MAC data; uboot_env mirrors CONFIG_ENV_OFFSET=0x100000 with
# a redundant copy at CONFIG_ENV_OFFSET_REDUND=0x104000.
#
# Vendor opensbi/u-boot live inside the eMMC mmcblk0boot0 hardware
# boot partition (flashed via `fastboot flash mmc0boot0`) — NOT in
# the GPT user area.  That partition is not described by genimage
# (it has no GPT entry); flash.sh handles it via fastboot.

image gentoo-linux-zhihe-a210_dev-emmc.img {
    hdimage {
        partition-table-type = gpt
        align = 1M
    }

    partition factory {
        offset = "512K"
        size = "32K"
        in-partition-table = "true"
    }

    partition uboot_env {
        offset = "1M"
        size = "32K"
        in-partition-table = "true"
    }

    partition boot_a {
        image = "bootfs.ext4"
        offset = "2M"
        size = "256M"
        in-partition-table = "true"
        partition-uuid = "04fb8c79-34ec-403e-ad5d-db205c76eff1"
    }

    partition boot_b {
        offset = "258M"
        size = "256M"
        in-partition-table = "true"
        partition-uuid = "999c1c6d-eb10-4656-a4ea-0bd5a88fa4e2"
    }

    partition system_a {
        image = "rootfs.ext4"
        offset = "514M"
        size = "2494M"
        in-partition-table = "true"
        partition-type-uuid = "root-riscv64"
        partition-uuid = "ff2a7ab6-5290-4d1c-bcb4-2b60f62ea961"
    }

    partition system_b {
        offset = "3008M"
        size = "2494M"
        in-partition-table = "true"
        partition-uuid = "3ee62a15-2457-4b7a-9e8e-785e1a9867f2"
    }

    partition app_a {
        offset = "5502M"
        size = "512M"
        in-partition-table = "true"
        partition-uuid = "c2d963d5-5601-4f0b-9959-c6b543b40a41"
    }

    partition app_b {
        offset = "6014M"
        size = "512M"
        in-partition-table = "true"
        partition-uuid = "d52e57e6-8bb7-4974-9282-fdecd05c7c92"
    }

    partition data {
        offset = "6526M"
        size = ""
        in-partition-table = "true"
        partition-uuid = "b8753fb5-3a4c-4de7-b6c0-4fd4a705f750"
    }
}
