config {
    outputpath = .
    inputpath = .
    rootpath = gen
    tmppath = tmp
}

image bootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "A210-BOOT"
    }
    size = 256M
    mountpoint = "/boot"
}

image rootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "A210-ROOT"
    }
    size = 4G
    mountpoint = "/root"
}

image gentoo-linux-zhihe-a210_dev-emmc.img {
    hdimage {
        partition-table-type = gpt
        align = 512K
    }

    partition factory {
        offset = "512K"
        size = "32K"
        in-partition-table = "true"
    }

    partition uboot_env {
        offset = "1M"
        size = "32K"
        in-partition-table = "true"
    }

    partition boot {
        image = "bootfs.ext4"
        offset = "2M"
        size = "256M"
        in-partition-table = "true"
    }

    partition rootfs {
        image = "rootfs.ext4"
        size = "4G"
        in-partition-table = "true"
    }
}
