config {
    outputpath = .
    inputpath = .
    rootpath = gen
    tmppath = tmp
}

image rootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "A210-ROOT"
        extraargs = "-i 4k"
    }

    size = 4G
    mountpoint = "/root"
}

image bootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "A210-BOOT"
    }

    size = 256M
    mountpoint = "/boot"
}

# Zhihe A210 eMMC GPT — OSL "flatten" layout (per a210-linux/docs/PARTITIONS.md
# + AB_LAYOUT.md).
#
# The vendor ships an A/B-redundant layout (boot_a/boot_b, system_a/system_b,
# app_a/app_b) for OTA-style updates.  OSL deploys a much simpler 4-partition
# layout instead:
#
#   1. factory   (16 KiB, vendor PARTUUID kept) — OTP / MAC / `fnv` store
#   2. uboot_env (16 KiB, vendor PARTUUID kept) — env redundant @ 0x100000 / 0x104000
#   3. boot      (256 MiB ext4, OSL PARTUUID …-0003, label A210-BOOT)
#   4. rootfs    (rest ext4,   OSL PARTUUID …-0004, label A210-ROOT)
#
# No initrd, no A/B + overlay yet (those are documented as future migration
# in AB_LAYOUT.md).  `booti` accepts unsigned kernel directly — vendor
# confirmed in writing 2026-05-28 (a210-linux/docs/KERNEL.md).
#
# Vendor opensbi/u-boot live inside the eMMC mmcblk0boot0 hardware boot
# partition (flashed via `fastboot flash mmc0boot0`), NOT in the GPT user
# area — flash.sh handles that separately.

image gentoo-linux-zhihe-a210_dev-emmc.img {
    hdimage {
        partition-table-type = gpt
        align = 1M
    }

    # Vendor stock factory + uboot_env partitions live at PARTUUIDs that
    # are board-burned and that we cannot reproduce from genimage:
    #   factory   PARTUUID bcafe35e-...    (per PARTITIONS.md)
    #   uboot_env PARTUUID 9d8828c9-...    (per PARTITIONS.md)
    # We deliberately reserve both slots at the vendor offset/size so the
    # vendor's `fnv` factory NVRAM and `saveenv` env still resolve by name
    # on real hardware.  PARTUUIDs in *this* image will differ — users who
    # want to verify their board matches OSL expectations should read
    # `gdisk -l /dev/mmcblk0` on a stock unit and compare against
    # PARTITIONS.md, not against this image.

    # factory: vendor-managed (OTP, MAC, `fnv` factory NVRAM).  Empty here
    # so we don't overwrite real hardware data; size + offset match vendor.
    partition factory {
        offset = "512K"
        size = "16K"
        in-partition-table = "true"
    }

    # uboot_env: u-boot saveenv target.  Same story — vendor-managed
    # contents, we just reserve the slot at vendor offset + size.
    partition uboot_env {
        offset = "1M"
        size = "16K"
        in-partition-table = "true"
    }

    # boot: kernel + DTB + extlinux.conf.  PARTUUID + label per OSL convention.
    partition boot {
        image = "bootfs.ext4"
        offset = "2M"
        size = "256M"
        in-partition-table = "true"
        partition-uuid = "0510b001-0000-4710-a210-000000000003"
    }

    # rootfs: Gentoo userland.  PARTUUID per OSL convention; kernel cmdline
    # boots from `root=PARTUUID=0510b001-0000-4710-a210-000000000004`.
    partition rootfs {
        image = "rootfs.ext4"
        offset = "258M"
        size = ""
        in-partition-table = "true"
        partition-type-uuid = "root-riscv64"
        partition-uuid = "0510b001-0000-4710-a210-000000000004"
    }
}
