config {
    outputpath = .
    inputpath = .
    rootpath = gen
    tmppath = tmp
}

image rootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "rootfs"
        extraargs = "-i 4k"
    }

    size = 5G
    mountpoint = "/root"
}

# Single ESP-style FAT bootfs holds /EFI/BOOT/bootriscv64.efi (UEFI
# removable-media fallback path, found by vendor u-boot's `bootflow scan`),
# plus the kernel Image, DTB, and grub.cfg.  Keeping it all in one FAT
# partition removes the need for a separate /boot ext4 and matches what
# SiFive's own Ubuntu/Yocto and RHEL 10 do on this board.
image bootfs.vfat {
    vfat {
        extraargs = "-F 32"
        label = "BOOTFS"
    }

    size = 256M
    mountpoint = "/boot"
}

# Single GPT image — dd to microSD / eMMC / NVMe / SATA / USB.
image gentoo-linux-premier-p550_dev-sdcard.img {
    hdimage {
        partition-table-type = gpt
    }

    partition bootfs {
        image = "bootfs.vfat"
        offset = "1M"
        size = "256M"
        in-partition-table = "true"
        partition-type-uuid = "U"
        bootable = "true"
    }

    partition rootfs {
        image = "rootfs.ext4"
        offset = "257M"
        size = ""
        in-partition-table = "true"
        partition-type-uuid = "root-riscv64"
    }
}
