config {
    outputpath = .
    inputpath = .
    rootpath = gen
    tmppath = tmp
}

image rootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "rootfs"
        extraargs = "-i 4k"
    }

    size = 3G
    mountpoint = "/root"
}

image bootfs.ext4 {
    ext4 {
        use-mke2fs = "true"
        label = "bootfs"
    }

    size = 128M
    mountpoint = "/boot"
}

/* Amlogic SD layout: BL1 spans sectors 0-96 and the FIP+u-boot starts at
 * sector 97, so the first usable partition must clear ~50 KiB. GPT is not
 * usable here (its primary header at sector 1 collides with BL1). */
image gentoo-linux-odroid-c2_dev-sdcard.img {
    hdimage {
        partition-table-type = mbr
    }

    partition bootloader {
        image = "u-boot-sd/u-boot.bin.sd.bin"
        offset = "0"
        /* MBR partition table lives at bytes 440-511. */
        holes = "(440; 512)"
        in-partition-table = "false"
    }

    partition bootfs {
        image = "bootfs.ext4"
        offset = "4M"
        size = "128M"
        partition-type = 0x83
        bootable = "true"
        in-partition-table = "true"
    }

    partition rootfs {
        image = "rootfs.ext4"
        offset = "132M"
        size = ""
        partition-type = 0x83
        in-partition-table = "true"
    }
}
